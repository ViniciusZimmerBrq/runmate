name: PR Quality

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  # Conventional Commits title (feat, fix, docs, refactor, test, chore, ci, release)
  pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            release
          requireScope: false

  # PR must not be too large (encourages atomic PRs)
  pr-size:
    name: PR Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff size
        run: |
          CHANGED_LINES=$(git diff --shortstat \
            ${{ github.event.pull_request.base.sha }}...HEAD \
            | awk '{print $4 + $6}')
          echo "Linhas alteradas: ${CHANGED_LINES:-0}"
          if [ "${CHANGED_LINES:-0}" -gt 5000 ]; then
            echo "❌ PR muito grande (${CHANGED_LINES} linhas). Considere dividir."
            exit 1
          fi
          echo "✓ Tamanho do PR dentro do limite."

  # PR description must have at least a summary (not empty template)
  pr-description:
    name: PR Description
    runs-on: ubuntu-latest
    steps:
      - name: Check description is filled
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$BODY" ] || [ ${#BODY} -lt 30 ]; then
            echo "❌ PR sem descrição. Preencha o template antes de abrir para review."
            exit 1
          fi
          echo "✓ Descrição presente."
