name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  flutter-android-artifact:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runmate_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: runmate-android-release
          path: runmate_app/build/app/outputs/flutter-apk/app-release.apk

  backend-publish-artifact:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runmate_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore RunMate.sln

      - name: Publish API
        run: dotnet publish src/RunMate.Api/RunMate.Api.csproj -c Release -o publish

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: runmate-backend-release
          path: runmate_backend/publish
