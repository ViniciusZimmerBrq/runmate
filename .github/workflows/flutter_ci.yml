name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
    paths:
      - "runmate_app/**"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runmate_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Flutter changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            flutter:
              - "runmate_app/**"
              - ".github/workflows/flutter_ci.yml"

      - name: Skip when Flutter app is unchanged
        if: steps.changes.outputs.flutter != 'true'
        run: echo "No Flutter changes detected; skipping Flutter CI."

      - name: Setup Flutter
        if: steps.changes.outputs.flutter == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"

      - name: Install dependencies
        if: steps.changes.outputs.flutter == 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.changes.outputs.flutter == 'true'
        run: flutter analyze

      - name: Test
        if: steps.changes.outputs.flutter == 'true'
        run: flutter test
