name: Flutter CI

on:
  pull_request:
    paths:
      - "runmate_app/**"
      - ".github/workflows/flutter_ci.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "runmate_app/**"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runmate_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
