name: Auto Approve Docs PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check bot token is configured
        id: token-check
        env:
          BOT_APPROVER_TOKEN: ${{ secrets.BOT_APPROVER_TOKEN }}
        run: |
          if [ -z "${BOT_APPROVER_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Detect eligible changes
        if: steps.token-check.outputs.configured == 'true'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            eligible:
              - 'README.md'
              - 'AGENT_PROMPTS_RUNMATE.md'
              - 'agents/**'
              - 'docs/**'
              - '.github/ISSUE_TEMPLATE/**'
              - '.github/pull_request_template.md'
            restricted:
              - '.github/workflows/**'
              - '.github/CODEOWNERS'
              - 'runmate_app/**'
              - 'runmate_backend/**'

      - name: Auto approve docs-only PR
        if: steps.token-check.outputs.configured == 'true' && steps.changes.outputs.eligible == 'true' && steps.changes.outputs.restricted != 'true'
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.BOT_APPROVER_TOKEN }}
          review-message: "Auto-approved for docs, process, templates, and agent-only changes."
