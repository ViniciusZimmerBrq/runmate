name: Agent Orchestrator

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - reopened
      - assigned
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - closed
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  route-issue:
    if: >
      secrets.PROJECT_AUTOMATION_TOKEN != '' &&
      (
        github.event_name == 'issues' &&
        github.event.action != 'assigned'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}

    steps:
      - name: Build and post agent routing comment
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          LABELS=$(gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join(",")')

          # Determine agent sequence based on labels
          AGENTS="**pm** → **po**"

          if echo "$LABELS" | grep -qiE "ux|ui|design|screen|flutter"; then
            AGENTS="$AGENTS → **ux-ui**"
          fi

          AGENTS="$AGENTS → **tech-lead**"

          if echo "$LABELS" | grep -qi "flutter"; then
            AGENTS="$AGENTS → **flutter-dev**"
          fi

          if echo "$LABELS" | grep -qi "backend"; then
            AGENTS="$AGENTS → **backend-dev**"
          fi

          if echo "$LABELS" | grep -qi "security"; then
            AGENTS="$AGENTS → **security**"
          fi

          AGENTS="$AGENTS → **pr-creator** → **code-review** → **qa**"

          BODY="## 🤖 Agent Routing

          **Squad sequence for this issue:**

          $AGENTS

          ---
          *Labels detected: \`${LABELS:-none}\`*
          *Auto-generated by Agent Orchestrator — [workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          # Update existing routing comment or create new one
          EXISTING=$(gh issue comment list "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json id,body \
            --jq '.[] | select(.body | startswith("## 🤖 Agent Routing")) | .id' | head -1)

          if [ -n "$EXISTING" ]; then
            gh issue comment edit "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          else
            gh issue comment create "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi

  issue-to-in-progress:
    if: >
      secrets.PROJECT_AUTOMATION_TOKEN != '' &&
      github.event_name == 'issues' &&
      github.event.action == 'assigned'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    env:
      GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}

    steps:
      - name: Move issue to In Progress in Projects
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_ID="${{ github.event.issue.node_id }}"

          # Find the project item for this issue and move to In Progress
          gh project item-list 1 \
            --owner "${{ github.repository_owner }}" \
            --format json \
            --jq ".items[] | select(.content.number == $ISSUE_NUMBER) | .id" \
          | while read -r ITEM_ID; do
            gh project item-edit \
              --id "$ITEM_ID" \
              --field-id Status \
              --project-id 1 \
              --text "In Progress"
          done || echo "Project automation skipped (project not configured)"

  pr-status-sync:
    if: >
      secrets.PROJECT_AUTOMATION_TOKEN != '' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}

    steps:
      - name: Sync linked issue status from PR
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"

          # Determine target status
          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TARGET_STATUS="QA"
          elif [ "$ACTION" = "closed" ]; then
            echo "PR closed without merge; skipping."
            exit 0
          else
            TARGET_STATUS="Review"
          fi

          # Extract linked issue numbers from PR body (Closes #N, Fixes #N, Resolves #N)
          PR_BODY=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json body --jq '.body // ""')

          LINKED_ISSUES=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+')

          if [ -z "$LINKED_ISSUES" ]; then
            echo "No linked issues found in PR body."
            exit 0
          fi

          for ISSUE_NUM in $LINKED_ISSUES; do
            gh project item-list 1 \
              --owner "${{ github.repository_owner }}" \
              --format json \
              --jq ".items[] | select(.content.number == $ISSUE_NUM) | .id" \
            | while read -r ITEM_ID; do
              gh project item-edit \
                --id "$ITEM_ID" \
                --field-id Status \
                --project-id 1 \
                --text "$TARGET_STATUS"
            done || echo "Project automation skipped for issue #$ISSUE_NUM"
          done

  reconcile-ready:
    if: secrets.PROJECT_AUTOMATION_TOKEN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}

    steps:
      - name: Refresh routing comments for Ready issues
        run: |
          # List all open issues with label "Ready" and refresh their routing comments
          gh issue list \
            --repo "${{ github.repository }}" \
            --label "Ready" \
            --state open \
            --json number,labels \
            --jq '.[] | "\(.number) \([.labels[].name] | join(","))"' \
          | while read -r ISSUE_NUMBER LABELS; do
            AGENTS="**pm** → **po**"

            if echo "$LABELS" | grep -qiE "ux|ui|design|screen|flutter"; then
              AGENTS="$AGENTS → **ux-ui**"
            fi

            AGENTS="$AGENTS → **tech-lead**"

            if echo "$LABELS" | grep -qi "flutter"; then
              AGENTS="$AGENTS → **flutter-dev**"
            fi

            if echo "$LABELS" | grep -qi "backend"; then
              AGENTS="$AGENTS → **backend-dev**"
            fi

            if echo "$LABELS" | grep -qi "security"; then
              AGENTS="$AGENTS → **security**"
            fi

            AGENTS="$AGENTS → **pr-creator** → **code-review** → **qa**"

            BODY="## 🤖 Agent Routing

          **Squad sequence for this issue:**

          $AGENTS

          ---
          *Labels detected: \`${LABELS:-none}\`*
          *Auto-generated by Agent Orchestrator — reconcile run*"

            EXISTING=$(gh issue comment list "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --json id,body \
              --jq '.[] | select(.body | startswith("## 🤖 Agent Routing")) | .id' | head -1)

            if [ -n "$EXISTING" ]; then
              gh issue comment edit "$EXISTING" \
                --repo "${{ github.repository }}" \
                --body "$BODY"
            else
              gh issue comment create "$ISSUE_NUMBER" \
                --repo "${{ github.repository }}" \
                --body "$BODY"
            fi
          done || echo "No Ready issues found."
