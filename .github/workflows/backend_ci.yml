name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
    paths:
      - "runmate_backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runmate_backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            backend:
              - "runmate_backend/**"
              - ".github/workflows/backend_ci.yml"

      - name: Skip when backend is unchanged
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes detected; skipping backend CI."

      - name: Setup .NET
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        if: steps.changes.outputs.backend == 'true'
        run: dotnet restore RunMate.sln

      - name: Build
        if: steps.changes.outputs.backend == 'true'
        run: dotnet build RunMate.sln --configuration Release --no-restore

      - name: Test
        if: steps.changes.outputs.backend == 'true'
        run: dotnet test RunMate.sln --configuration Release --no-build
