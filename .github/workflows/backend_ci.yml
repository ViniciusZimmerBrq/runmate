name: Backend CI

on:
  pull_request:
    paths:
      - "runmate_backend/**"
      - ".github/workflows/backend_ci.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "runmate_backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runmate_backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore RunMate.sln

      - name: Build
        run: dotnet build RunMate.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RunMate.sln --configuration Release --no-build
