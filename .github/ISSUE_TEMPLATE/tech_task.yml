name: Tech Task
description: Track technical work aligned with architecture, platform, CI, or security
title: "[Tech]: "
labels:
  - tech-debt
body:
  - type: input
    id: reference
    attributes:
      label: Reference
      placeholder: TECH-001
  - type: textarea
    id: objective
    attributes:
      label: Objective
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this technical task?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Flutter
        - Backend
        - Security
        - DevOps
        - Platform
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
