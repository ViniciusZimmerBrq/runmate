name: Feature Request
description: Propose a new feature or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the proposed solution.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and Constraints
      description: What should be in and out of scope?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product
        - Flutter
        - Backend
        - Architecture
        - CI/CD
